name: Install dependencies
description: Install dependencies for the project and the phar builder

inputs:
  php-version:
    description: The PHP version to use
    required: true
    default: '8.2'
  composer-flags:
    description: Install dev dependencies
    required: false
    default: ''
  need_phar:
    description: Install phar dependencies
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
      with:
        php-version: '${{ inputs.php-version }}'
        coverage: none

    - name: Install dependencies (project)
      run: composer install --prefer-dist --no-progress --optimize-autoloader --classmap-authoritative ${INPUTS_COMPOSER_FLAGS}
      shell: bash
      env:
        INPUTS_COMPOSER_FLAGS: ${{ inputs.composer-flags }}

    - name: Install dependencies (phar builder)
      run: composer install --prefer-dist --no-progress --optimize-autoloader --classmap-authoritative
      shell: bash
      working-directory: tools/phar
      if: ${{ inputs.need_phar == 'true' }}
